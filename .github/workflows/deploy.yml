name: Deploy to GCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: sharp-leaf-451416-r4

      - name: Deploy to Compute Engine
        run: |
          gcloud compute ssh user@instance-20260220-140252 \
            --zone "us-central1-f" \
            --project "sharp-leaf-451416-r4" \
            --quiet \
            --command "sudo chown -R user:user /home/user/backend && cd /home/user/backend && eval \$(ssh-agent -s) && ssh-add /home/user/.ssh/id_ed25519 && git pull origin main && source .venv/bin/activate && uv pip install -r requirements.txt && sudo systemctl restart fastapi-backend"
